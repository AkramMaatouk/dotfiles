# ─────────────────────────────────────────────
# starship/starship.toml  →  ~/.config/starship.toml
# Theme: Catppuccin Mocha palette
# Icons: JetBrainsMono Nerd Font glyphs
# ─────────────────────────────────────────────

# ── Prompt layout ─────────────────────────────
# Single line left prompt + right prompt for time/duration.
# Avoids the double-cursor bug caused by two-line formats
# conflicting with zsh's own line handling.
format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$character\
"""

# Right prompt — time and duration stay out of the way
right_format = """
$cmd_duration\
$time\
"""

add_newline = true
palette     = "catppuccin_mocha"

# ── Catppuccin Mocha palette ──────────────────
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

# ── Character (prompt symbol) ─────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold mauve)"

# ── Directory ─────────────────────────────────
[directory]
style            = "bold blue"
read_only        = " 󰌾"
read_only_style  = "red"
truncation_length = 4
truncate_to_repo = true
format           = "[ 󰉋 $path]($style)[$read_only]($read_only_style) "

# ── Git branch ────────────────────────────────
[git_branch]
symbol = " "
style  = "bold mauve"
format = "[$symbol$branch(:$remote_branch)]($style) "

# ── Git status ────────────────────────────────
[git_status]
style      = "bold yellow"
format     = "([$all_status$ahead_behind]($style) )"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
staged     = "[++${count}](green)"
modified   = "[~${count}](peach)"
untracked  = "[?${count}](overlay2)"
deleted    = "[-${count}](red)"
conflicted = "[!${count}](red)"

# ── Git state (rebasing, merging, etc.) ───────
[git_state]
style  = "bold red"
format = "([$state($progress_current/$progress_total)]($style) )"

# ── Username ──────────────────────────────────
# Only shown when root or over SSH
[username]
style_user  = "bold teal"
style_root  = "bold red"
format      = "[$user]($style) "
show_always = false

# ── Hostname ──────────────────────────────────
# Shown when connected over SSH — critical for Pi sessions
[hostname]
ssh_only  = true
style     = "bold peach"
format    = "[@$hostname]($style) "
ssh_symbol = " "

# ── OS icon ───────────────────────────────────
[os]
disabled = false
style    = "subtext0"
format   = "[$symbol]($style) "

[os.symbols]
Linux   = " "
Macos   = " "
Windows = "󰍲 "
Raspbian = " "  # Shown on your Pi sessions

# ── Command duration ──────────────────────────
[cmd_duration]
min_time           = 2000   # Only show for commands > 2s
style              = "bold yellow"
format             = "[ 󱎫 $duration]($style) "
show_milliseconds  = false

# ── Time ──────────────────────────────────────
[time]
disabled  = false
style     = "subtext0"
format    = "[ $time]($style) "
time_format = "%H:%M"

# ── Python ────────────────────────────────────
[python]
symbol = " "
style  = "bold yellow"
format = "[$symbol$version( \\($virtualenv\\))]($style) "

# ── Node.js ───────────────────────────────────
[nodejs]
symbol = " "
style  = "bold green"
format = "[$symbol$version]($style) "

# ── Rust ──────────────────────────────────────
[rust]
symbol = " "
style  = "bold peach"
format = "[$symbol$version]($style) "

# ── Go ────────────────────────────────────────
[golang]
symbol = " "
style  = "bold sky"
format = "[$symbol$version]($style) "

# ── Tmux indicator ────────────────────────────
# No native Starship module for tmux, but the hostname/SSH modules
# already surface the most useful context for Pi remote sessions.
# You can add $env_var to surface $TMUX_PANE if desired.
[env_var.TMUX]
variable = "TMUX"
default  = ""
symbol   = "󰓩 "
style    = "bold mauve"
format   = "[$symbol]($style)"
